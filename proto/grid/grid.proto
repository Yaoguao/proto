syntax = "proto3";

package grid;

option go_package = "grid.v2;gridv2";


service GridService {
  rpc GetSubTask(stream TaskRequest) returns (stream SubTask);

  rpc AddTask(Task) returns (TaskRequest);

  rpc SubmitResult(SubTaskResult) returns (Ack);

}


message TaskRequest {
  int64 task_id = 1;
}

message SubTask {
  int64 id = 1;
  int64 task_id = 2;

  Graph graph = 3;

  repeated int32 taxi_nodes = 4;
  repeated int32 passenger_nodes = 5;

  int32 dimension = 6;

  int64 start_index = 7;
  int64 count = 8;
}


message Task {
  Graph graph = 1;
  repeated int32 taxi_nodes = 2;
  repeated int32 passenger_nodes = 3;
}

message Graph {
  int32 nodes = 1;
  repeated Edge edges = 2;
}

message Edge {
  int32 from = 1;
  int32 to = 2;
  int32 weight = 3;
}


message SubTaskResult {
  int64 id = 1;
  int64 task_id = 2;

  int32 taxi_node = 3;
  repeated int32 costs = 4;
}

message Ack {
  bool ok = 1;
}