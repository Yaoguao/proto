syntax = "proto3";

package grid;

option go_package = "grid.v2;gridv2";


service GridService {
  rpc Work(stream WorkerMessage) returns (stream MasterMessage);

  rpc AddTask(Task) returns (TaskCreated);
}


// client -> master


message Task {
  Graph graph = 1;
  repeated int32 taxi_nodes = 2;
  repeated int32 passenger_nodes = 3;
}

message TaskCreated {
  int64 task_id = 1;
}

// graph struct

message Graph {
  int32 nodes = 1;
  repeated Edge edges = 2;
}

message Edge {
  int32 from = 1;
  int32 to = 2;
  int32 weight = 3;
}


// worker <-> master stream


message WorkerMessage {
  oneof payload {
    WorkerReady ready = 1;
    SubTaskResult result = 2;
    Heartbeat heartbeat = 3;
  }
}

message MasterMessage {
  oneof payload {
    SubTask subtask = 1;
    NoTask no_task = 2;
  }
}


// worker -> master


message WorkerReady {}

message Heartbeat {}

message SubTaskResult {
  int64 task_id = 1;
  int32 taxi_node = 2;
  repeated int32 costs = 3;
}


// master -> worker


message SubTask {
  int64 task_id = 1;
  int32 taxi_node = 2;
  Graph graph = 3;
  repeated int32 passenger_nodes = 4;
}

message NoTask {}
